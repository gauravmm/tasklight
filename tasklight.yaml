port: 57017

dock:
  position: BR          # TL | TC | TR | ML | MR | BL | BC | BR
  margin: 16            # px from screen edge
  width: 360            # widget width in px

theme:
  background: "#1e1e1e"
  background_alpha: 0.85
  foreground: "#e8e8e8"
  dimmed: "#888888"
  accent_spinner: "#5599ff"
  accent_done: "#44cc77"
  accent_approval: "#ff4444"
  approval_row_bg: "#3a2800"
  font_family: "monospace"
  font_size_px: 13
  corner_radius: 10
  spinner: braille      # claude | braille | opencode

timeouts:
  done_auto_remove_s: 0   # 0 = never auto-remove DONE agents
  exit_grace_s: 30
