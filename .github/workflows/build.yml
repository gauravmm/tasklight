name: Build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  windows-exe:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --dev

      - name: Build exe
        run: uv run pyinstaller tasklight.spec

      - uses: actions/upload-artifact@v4
        with:
          name: tasklight-windows
          path: dist/tasklight.exe

  linux-wheel:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: Build wheel
        run: uv build --wheel

      - uses: actions/upload-artifact@v4
        with:
          name: tasklight-wheel
          path: dist/*.whl

  release:
    needs: [windows-exe, linux-wheel]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: tasklight-windows
          path: artifacts/

      - uses: actions/download-artifact@v4
        with:
          name: tasklight-wheel
          path: artifacts/

      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            artifacts/tasklight.exe \
            artifacts/*.whl
